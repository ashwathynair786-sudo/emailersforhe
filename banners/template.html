<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Bricolage Grotesque';
    src: url('../assets/fonts/BricolageGrotesque-Variable.ttf') format('truetype-variations');
    font-weight: 200 800;
    font-style: normal;
  }
  @font-face {
    font-family: 'Geist';
    src: url('../assets/fonts/Geist-Variable.ttf') format('truetype-variations');
    font-weight: 100 900;
    font-style: normal;
  }
  @font-face {
    font-family: 'Geist';
    src: url('../assets/fonts/Geist-Italic-Variable.ttf') format('truetype-variations');
    font-weight: 100 900;
    font-style: italic;
  }

  :root {
    --bg: #FBF9F3;
    --bg-card: #FFFFFF;
    --bg-dark: #020109;
    --text: #020109;
    --text-muted: #545459;
    --text-faint: #8A8A90;
    --border: rgba(2,1,9,0.1);
    --accent: #13255D;
    --cta: #FF5722;
    --lime: #C7F252;
    --eyebrow-on-dark: #A5A5AD;
    --display: 'Bricolage Grotesque', sans-serif;
    --body: 'Geist', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 250px;
    background: var(--bg);
    font-family: var(--body);
    overflow: hidden;
  }

  .banner {
    position: relative;
    width: 600px;
    height: 250px;
    background: var(--bg);
    overflow: hidden;
  }

  /* ---- subtle contour motif, brand background texture ---- */
  .contours {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.5;
    pointer-events: none;
  }
  .contours svg { width: 100%; height: 100%; }
  .contours .c { fill: none; stroke: rgba(19,37,93,0.16); stroke-width: 0.9; }
  .contours .c.major { stroke: rgba(19,37,93,0.24); stroke-width: 1.1; }

  /* ---- text column ---- */
  .content {
    position: relative;
    z-index: 2;
    height: 250px;
    width: 306px;
  }

  .logo {
    position: absolute;
    top: 22px;
    left: 32px;
    height: 14px;
    width: 75px;
    object-fit: contain;
    object-position: left center;
  }

  .content-body {
    position: absolute;
    top: 62px;
    left: 32px;
    right: 18px;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .eyebrow {
    display: block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.4px;
    max-width: 260px;
  }
  .eyebrow .bracket { color: rgba(19,37,93,0.45); padding: 0 5px; }

  .greeting {
    font-family: var(--display);
    font-weight: 500;
    font-size: 40px;
    line-height: 1;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .banner.theme-dark .greeting,
  .banner.theme-navy .greeting {
    color: var(--lime);
    text-shadow: 0 0 22px rgba(199,242,82,0.45);
  }

  .headline {
    font-family: var(--display);
    font-weight: 500;
    font-size: 21px;
    line-height: 1.15;
    letter-spacing: -0.4px;
    color: var(--text);
    max-width: 288px;
  }
  .headline em {
    font-style: normal;
    font-weight: 500;
    color: var(--cta);
  }

  .subcopy {
    font-family: var(--body);
    font-weight: 400;
    font-size: 13px;
    line-height: 1.45;
    color: var(--text-muted);
    max-width: 270px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
    margin-top: 4px;
    background: var(--cta);
    color: #FFFFFF;
    font-family: var(--body);
    font-weight: 500;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 8px;
    letter-spacing: -0.1px;
  }

  /* ---- illustration column ---- */
  .art {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 318px;
    overflow: hidden;
    z-index: 1;
  }
  .art img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .art .fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--bg) 0%, rgba(251,249,243,0) 16%);
  }

  /* ---- hand-built "grinder" scene (no source photo supplied) ---- */
  .art-scene {
    position: absolute;
    inset: 0;
    background: var(--bg);
  }
  .g-card {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 10px 24px rgba(2,1,9,0.05);
  }
  .g-chart { top: 20px; left: 60px; width: 150px; height: 96px; padding: 12px 14px; }
  .g-chart-label { font-family: var(--mono); font-size: 8.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .g-bars { display: flex; align-items: flex-end; gap: 8px; height: 50px; }
  .g-bar { flex: 1; border-radius: 3px 3px 0 0; background: rgba(19,37,93,0.22); position: relative; }
  .g-bar:nth-child(2) { background: rgba(19,37,93,0.4); }
  .g-bar:nth-child(3) { background: rgba(19,37,93,0.62); }
  .g-bar:nth-child(4) { background: rgba(19,37,93,0.88); }
  .g-bar .dot { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 7px; height: 7px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 0 3px rgba(199,242,82,0.28); }

  .g-list { top: 128px; left: 92px; width: 176px; padding: 11px 14px; display: flex; flex-direction: column; gap: 8px; }
  .g-row { display: flex; align-items: center; gap: 8px; }
  .g-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid rgba(2,1,9,0.18); flex-shrink: 0; position: relative; }
  .g-dot.done { border-color: var(--lime); background: var(--lime); }
  .g-dot.done::after { content: ''; position: absolute; top: 3px; left: 2.5px; width: 6px; height: 3.5px; border-left: 1.4px solid var(--text); border-bottom: 1.4px solid var(--text); transform: rotate(-45deg); }
  .g-row-text { font-family: var(--body); font-size: 10.5px; font-weight: 500; color: var(--text); flex: 1; }
  .g-tag { font-family: var(--mono); font-size: 8px; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 6px; border-radius: 100px; }
  .g-tag.easy { background: #D1FAE5; color: #059669; }
  .g-tag.med { background: #FEF3C7; color: #B45309; }
  .g-tag.hard { background: #FEE2E2; color: #DC2626; }

  .g-chip { top: 20px; right: 20px; width: 66px; height: 58px; padding: 10px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .g-chip-num { font-family: var(--display); font-weight: 500; font-size: 20px; letter-spacing: -0.5px; color: var(--text); }
  .g-chip-unit { font-size: 11px; color: var(--text-faint); font-weight: 400; margin-left: 1px; }
  .g-chip-label { font-family: var(--mono); font-size: 7.5px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-faint); }

  .g-tile { position: absolute; bottom: 22px; left: 56px; width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 12px; color: #fff; box-shadow: 0 8px 16px rgba(19,37,93,0.25); }

  /* ---- hand-built "milestone" scene (celebratory vector illustration) ---- */
  .m-scene { position: absolute; inset: 0; }

  .m-card {
    position: absolute;
    top: 74px; left: 40px; width: 196px; height: 106px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 14px 28px rgba(2,1,9,0.08);
    overflow: hidden;
  }
  .m-card-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .m-dots { display: flex; gap: 5px; }
  .m-dot { width: 6px; height: 6px; border-radius: 50%; }
  .m-dot.red { background: #DC2626; }
  .m-dot.amber { background: #F59E0B; }
  .m-dot.green { background: #059669; }
  .m-card-label { font-family: var(--mono); font-size: 8px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.6px; }
  .m-card-body { padding: 16px 14px; display: flex; align-items: center; gap: 12px; }
  .m-check { width: 40px; height: 40px; border-radius: 50%; background: var(--lime); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 0 5px rgba(199,242,82,0.16); }
  .m-check svg { width: 18px; height: 18px; }
  .m-result-title { font-family: var(--body); font-weight: 600; font-size: 14.5px; color: var(--text); }
  .m-result-sub { font-family: var(--mono); font-size: 8.5px; color: var(--text-faint); margin-top: 3px; letter-spacing: 0.3px; }

  .m-medal {
    position: absolute; top: 18px; right: 36px;
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--cta);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 12px 26px rgba(255,87,34,0.35);
    border: 3px solid rgba(255,255,255,0.9);
  }
  .m-medal .num { font-family: var(--display); font-weight: 500; font-size: 22px; color: #fff; line-height: 1; }
  .m-medal .ord { font-family: var(--mono); font-size: 7.5px; color: rgba(255,255,255,0.88); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
  .m-medal-tail { position: absolute; top: 78px; width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; }
  .m-medal-tail.l { right: 78px; border-top: 16px solid var(--accent); transform: rotate(14deg); }
  .m-medal-tail.r { right: 44px; border-top: 16px solid var(--accent); transform: rotate(-14deg); }

  .m-confetti span { position: absolute; display: block; }
  .m-confetti .dot { width: 6px; height: 6px; border-radius: 50%; }
  .m-confetti .bar { width: 4px; height: 12px; border-radius: 1px; }

  .m-card.m-card--code { top: 62px; height: 124px; }
  .m-card.m-card--vibe { top: 44px; height: 156px; }
  .m-card-body.m-code { flex-direction: column; align-items: flex-start; gap: 7px; padding: 14px 14px 12px; }
  .m-code-line { height: 6px; border-radius: 3px; }
  .m-code-status { display: flex; align-items: center; gap: 7px; margin-top: 5px; font-family: var(--body); font-weight: 600; font-size: 11.5px; color: #fff; }
  .m-code-check { width: 17px; height: 17px; border-radius: 50%; background: var(--lime); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .m-code-check svg { width: 9px; height: 9px; }

  .m-card.m-card--assess { top: 62px; height: 124px; }
  .m-card-body.m-assess { flex-direction: column; align-items: stretch; gap: 12px; padding: 15px 14px 14px; }
  .m-assess-row { display: flex; align-items: center; gap: 11px; }
  .m-meter { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.12); position: relative; overflow: hidden; }
  .m-meter-fill { position: absolute; top: 0; left: 0; bottom: 0; border-radius: 3px; background: var(--lime); }
  .m-meter-label { font-family: var(--mono); font-size: 8.5px; color: rgba(255,255,255,0.5); margin-top: 6px; letter-spacing: 0.3px; }

  .m-vibe-prompt { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 7px 10px; font-family: var(--mono); font-size: 8.5px; color: rgba(255,255,255,0.68); width: 100%; }
  .m-vibe-prompt svg { flex-shrink: 0; }

  .m-vibe-lang { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.65); }
  .m-vibe-chip { display: flex; align-items: center; justify-content: center; width: 17px; height: 17px; border-radius: 5px; background: var(--accent); color: #fff; font-size: 8px; font-weight: 600; flex-shrink: 0; }

  .m-card.m-card--nudge { top: 34px; height: 172px; }
  .m-card-body.m-paths { flex-direction: column; gap: 6px; padding: 12px; }
  .m-path-row { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 8px; border: 1px solid transparent; }
  .m-path-row.active { background: rgba(199,242,82,0.12); border-color: rgba(199,242,82,0.32); }
  .m-path-icon { width: 21px; height: 21px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); }
  .m-path-row.active .m-path-icon { background: var(--lime); }
  .m-path-icon svg { width: 11px; height: 11px; stroke: rgba(255,255,255,0.6); }
  .m-path-row.active .m-path-icon svg { stroke: #020109; }
  .m-path-label { font-family: var(--body); font-size: 10.5px; font-weight: 500; color: rgba(255,255,255,0.5); flex: 1; }
  .m-path-row.active .m-path-label { color: #fff; font-weight: 600; }
  .m-path-arrow { font-family: var(--mono); font-size: 12px; color: var(--lime); opacity: 0; }
  .m-path-row.active .m-path-arrow { opacity: 1; }

  .m-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .m-skill-tag { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 4px 9px; }

  .m-lead-row { display: flex; align-items: center; gap: 9px; }
  .m-lead-rank { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-family: var(--mono); font-size: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .m-lead-rank.gold { background: var(--cta); color: #fff; }
  .m-lead-bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); }

  .m-nudge { position: absolute; width: 58px; height: 58px; display: flex; align-items: center; justify-content: center; z-index: 3; }
  .m-nudge .ring { position: absolute; border-radius: 50%; border: 1.5px solid var(--lime); }
  .m-nudge .ring1 { width: 58px; height: 58px; opacity: 0.16; }
  .m-nudge .ring2 { width: 40px; height: 40px; opacity: 0.32; }
  .m-nudge .core { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--lime); box-shadow: 0 0 16px rgba(199,242,82,0.5); display: flex; align-items: center; justify-content: center; }
  .m-nudge .core img, .m-nudge .core svg { width: 14px; height: 14px; display: block; }

  /* on-dark tuning for the milestone scene */
  .banner.theme-dark .m-card,
  .banner.theme-navy .m-card { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); box-shadow: none; }
  .banner.theme-dark .m-card-head,
  .banner.theme-navy .m-card-head { border-bottom-color: rgba(255,255,255,0.1); }
  .banner.theme-dark .m-result-title,
  .banner.theme-navy .m-result-title { color: #FFFFFF; }
  .banner.theme-dark .m-result-sub,
  .banner.theme-navy .m-result-sub,
  .banner.theme-dark .m-card-label,
  .banner.theme-navy .m-card-label { color: rgba(255,255,255,0.45); }
  .banner.theme-dark .m-medal,
  .banner.theme-navy .m-medal { border-color: rgba(2,1,9,0.35); }

  /* ---- founder / welcome photo treatment ---- */
  .founder-scene { position: absolute; inset: 0; }
  .founder-scene .photo-frame {
    position: absolute;
    top: 22px; right: 22px; bottom: 22px; left: 36px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 16px 32px rgba(2,1,9,0.1);
  }
  .founder-scene img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .founder-scene .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(2,1,9,0) 55%, rgba(2,1,9,0.72) 100%);
  }
  .founder-scene .attr {
    position: absolute; left: 18px; right: 18px; bottom: 14px;
    color: #fff;
  }
  .founder-scene .attr .name { font-family: var(--body); font-weight: 600; font-size: 13px; letter-spacing: -0.1px; margin-bottom: 2px; }
  .founder-scene .attr .role { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.72); }
  .founder-scene .quote-mark {
    position: absolute; top: 14px; left: 16px;
    font-family: var(--display); font-size: 40px; color: rgba(255,255,255,0.55);
    line-height: 1; font-weight: 500;
  }

  /* ---- dark themes (black + navy share on-dark text treatment) ---- */
  .banner.theme-dark { background: var(--bg-dark); }
  .banner.theme-navy { background: var(--accent); }
  .banner.theme-dark .contours,
  .banner.theme-navy .contours { opacity: 0.4; }
  .banner.theme-dark .contours .c,
  .banner.theme-navy .contours .c { stroke: rgba(255,255,255,0.16); }
  .banner.theme-dark .contours .c.major,
  .banner.theme-navy .contours .c.major { stroke: rgba(255,255,255,0.26); }
  .banner.theme-dark .eyebrow,
  .banner.theme-navy .eyebrow { color: var(--eyebrow-on-dark); }
  .banner.theme-dark .eyebrow .bracket,
  .banner.theme-navy .eyebrow .bracket { color: rgba(255,255,255,0.32); }
  .banner.theme-dark .headline,
  .banner.theme-navy .headline { color: #FFFFFF; }
  .banner.theme-dark .subcopy,
  .banner.theme-navy .subcopy { color: rgba(255,255,255,0.62); }
  .banner.theme-dark .art .fade { background: linear-gradient(90deg, var(--bg-dark) 0%, rgba(2,1,9,0) 16%); }
  .banner.theme-navy .art .fade { background: linear-gradient(90deg, var(--accent) 0%, rgba(19,37,93,0) 16%); }
  .banner.theme-dark .founder-scene .photo-frame,
  .banner.theme-navy .founder-scene .photo-frame { box-shadow: 0 16px 32px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); }
  .banner.theme-dark .g-card,
  .banner.theme-navy .g-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); box-shadow: none; }
  .banner.theme-dark .g-chart-label, .banner.theme-dark .g-chip-label,
  .banner.theme-navy .g-chart-label, .banner.theme-navy .g-chip-label { color: rgba(255,255,255,0.45); }
  .banner.theme-dark .g-chip-num, .banner.theme-dark .g-row-text,
  .banner.theme-navy .g-chip-num, .banner.theme-navy .g-row-text { color: #FFFFFF; }
  .banner.theme-dark .g-chip-unit,
  .banner.theme-navy .g-chip-unit { color: rgba(255,255,255,0.45); }
  .banner.theme-dark .g-dot,
  .banner.theme-navy .g-dot { border-color: rgba(255,255,255,0.25); }
  .banner.theme-dark .g-bar,
  .banner.theme-navy .g-bar { background: rgba(255,255,255,0.16); }
  .banner.theme-dark .g-bar:nth-child(2), .banner.theme-navy .g-bar:nth-child(2) { background: rgba(255,255,255,0.32); }
  .banner.theme-dark .g-bar:nth-child(3), .banner.theme-navy .g-bar:nth-child(3) { background: rgba(255,255,255,0.55); }
  .banner.theme-dark .g-bar:nth-child(4), .banner.theme-navy .g-bar:nth-child(4) { background: rgba(255,255,255,0.85); }
  .banner.theme-dark .art-scene,
  .banner.theme-navy .art-scene { background: transparent; }
</style>
</head>
<body>
  <div class="banner __THEME_CLASS__">
    <div class="contours">__CONTOURS__</div>
    <div class="content">
      <img class="logo" src="__LOGO_SRC__" alt="HackerEarth">
      <div class="content-body">
        __EYEBROW_BLOCK__
        __GREETING__
        <div class="headline">__HEADLINE__</div>
        __SUBCOPY__
        __CTA_BLOCK__
      </div>
    </div>
    <div class="art">
      __ART__
      <div class="fade"></div>
    </div>
  </div>
</body>
</html>
